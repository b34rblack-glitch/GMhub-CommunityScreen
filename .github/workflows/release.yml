name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build module zip and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Ensure module.json version matches tag
        run: |
          mver=$(node -e "console.log(require('./module.json').version)")
          if [ "$mver" != "${{ steps.ver.outputs.version }}" ]; then
            echo "module.json version ($mver) does not match tag (${{ steps.ver.outputs.version }})" >&2
            exit 1
          fi

      - name: Build module.zip
        run: |
          zip -r module.zip \
            module.json \
            README.md \
            LICENSE \
            CHANGELOG.md \
            scripts \
            styles \
            templates \
            lang

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.zip
            module.json
          generate_release_notes: true
