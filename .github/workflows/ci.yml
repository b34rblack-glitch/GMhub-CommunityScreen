name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  validate:
    name: Lint + syntax + manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dev dependencies
        run: npm install --no-audit --no-fund

      - name: Validate module.json
        run: npm run check:manifest

      - name: Parse-check every script (node --check)
        run: npm run check:syntax

      - name: ESLint
        run: npm run lint

      - name: Prettier (check)
        run: npm run format:check

      - name: Validate JSON files
        run: |
          for f in module.json lang/en.json .prettierrc.json package.json; do
            echo "Checking $f"
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"
          done
